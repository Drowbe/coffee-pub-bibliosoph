name: Release Creation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Get version from tag
      - name: Get Version
        id: get-version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Compile compendium packs from committed JSON sources (packs/_source/)
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Build Compendium Packs
        run: |
          npm install --no-audit --no-fund
          npm run packs:build

      # Create zip file
      - name: Create Zip File
        run: |
          # Ensure the zip excludes unnecessary files (packs ship compiled LevelDB, not _source JSON)
          zip -r coffee-pub-bibliosoph.zip \
            module.json \
            LICENSE \
            README.md \
            scripts/ \
            styles/ \
            templates/ \
            lang/ \
            images/ \
            resources/ \
            sounds/ \
            packs/ \
            -x "*.git*" -x "*.github*" -x "*node_modules*" -x "*.vscode*" \
            -x "packs/_source/*" -x "packs/*/LOCK" -x "packs/*/LOG*"

      # Create release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            coffee-pub-bibliosoph.zip
            module.json
          draft: false
          prerelease: false
          name: Release ${{ steps.get-version.outputs.version }}
          body: |
            Release version ${{ steps.get-version.outputs.version }}
            
            ## What's Changed
            * Automated release from tag v${{ steps.get-version.outputs.version }}
            
            For full changes, see the [changelog](CHANGELOG.md). 